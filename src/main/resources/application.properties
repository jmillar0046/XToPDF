spring.application.name=xtopdf

# File upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB

# Rate limiting
xtopdf.rate-limit.enabled=true
xtopdf.rate-limit.requests-per-minute=100
xtopdf.rate-limit.window-seconds=60

# Conversion timeout
xtopdf.conversion.timeout-seconds=300

# Temp file cleanup
xtopdf.temp.directory=${java.io.tmpdir}
xtopdf.temp.max-age-minutes=60
xtopdf.temp.cleanup-interval-minutes=15

# CORS
xtopdf.cors.allowed-origins=
xtopdf.cors.allowed-methods=GET,POST
xtopdf.cors.max-age-seconds=3600

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Container orchestration settings
container.orchestration.enabled=false
container.orchestration.runtime=podman
container.orchestration.image.name=xtopdf-converter
container.orchestration.image.tag=latest
container.orchestration.memory.limit=512m
container.orchestration.cpu.limit=1
container.orchestration.container.port=8080
container.orchestration.timeout.seconds=300
container.orchestration.cleanup.enabled=true
