# Chaos Monkey Configuration
# Activate this profile with: --spring.profiles.active=chaos

# Enable Chaos Monkey
chaos.monkey.enabled=true

# Watcher configuration - watch the FileConversionService
chaos.monkey.watcher.service=true
chaos.monkey.watcher.controller=false
chaos.monkey.watcher.repository=false
chaos.monkey.watcher.component=false

# Assault configuration
chaos.monkey.assaults.level=5
chaos.monkey.assaults.latencyActive=true
chaos.monkey.assaults.latencyRangeStart=100
chaos.monkey.assaults.latencyRangeEnd=500
chaos.monkey.assaults.exceptionsActive=true
chaos.monkey.assaults.exception.type=java.lang.RuntimeException
chaos.monkey.assaults.exception.arguments[0].className=java.lang.String
chaos.monkey.assaults.exception.arguments[0].value=Chaos Monkey - simulated failure

# Kill application assault (disabled by default)
chaos.monkey.assaults.killApplicationActive=false

# Memory assault (disabled by default)
chaos.monkey.assaults.memoryActive=false

# Management endpoint for runtime control
management.endpoint.chaosmonkey.enabled=true
management.endpoint.chaosmonkeyjmx.enabled=true
